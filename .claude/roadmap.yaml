# Roadmap editoriale evergreen — Magazine Como (como-blog-ai)
#
# Pilote le 1er deploiement du systeme /create-article-auto (depuis 2026-04-23).
# Source : Google Sheet "Como - feuille de route blog evergreen magazine.como.fr"
# https://docs.google.com/spreadsheets/d/1rJvJvoewI2IMLCenUxFX1mxhswmb37LiwwjvU1oHvv4
#
# Blog : https://magazine.como.fr/
# Langue principale : fr (+ EN auto dans /en/)
# Categories valides (doivent matcher hugo.toml, sans accents) :
#   - Modeles et comparatifs
#   - Financement
#   - Electrique
#   - Occasion
#   - Concessionnaires
#   - Conseils pratiques
#
# CHAMPS
# ------
# Edites par l'humain :
#   kw              Mot-cle principal SEO cible (langue principale)
#   category        Categorie du blog (liste ci-dessus)
#   volume          Volume mensuel de recherche (informatif, ignore par l'agent)
#   kd              Difficulte du mot-cle 0-100 (informatif, ignore par l'agent)
#   scheduled_date  YYYY-MM-DD, date a partir de laquelle l'agent peut publier
#   status          todo | done | failed
#
# Remplis par l'agent (ne pas toucher sauf pour debloquer un failed) :
#   published_date, published_url_fr, published_url_en, error
#
# CADENCE : 2 articles/semaine, mardi + vendredi
# Article 1 (vignette crit air) : test manuel Damien le 23/04
# Articles 2 a 37 : lances par la routine /schedule a partir du vendredi 24/04/2026


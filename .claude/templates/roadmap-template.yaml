# Roadmap editoriale evergreen — skill /create-article-auto
#
# Ce fichier alimente la skill /create-article-auto (publication automatique
# d'articles evergreen SEO, bilingue FR + EN).
#
# FONCTIONNEMENT
# --------------
# A chaque execution (planifiee via /schedule ou manuelle), l'agent :
#   1. Filtre les entrees avec status: todo et scheduled_date <= today
#   2. Prend la plus ancienne
#   3. Analyse la SERP sur le kw (SerpAPI + WebFetch des 5 concurrents)
#   4. Genere l'article FR + EN en full auto
#   5. Publie sur GitHub (push main direct, GitHub Actions deploie)
#   6. Met a jour l'entree ci-dessous : status: done, published_date, URLs
#
# En cas de blocage (SERP indispo, image KO, build KO, push rejete 3x) :
#   - status passe a failed
#   - error est rempli avec le message
#   - l'entree n'est PAS retentee automatiquement (intervention humaine requise)
#
# CHAMPS EDITABLES PAR L'HUMAIN
# -----------------------------
#   kw              (obligatoire) Mot-cle principal SEO cible. Langue principale du blog.
#   category        (obligatoire) Categorie du blog. Doit matcher une categorie definie
#                                 dans le hugo.toml (en langue principale).
#   volume          (informatif)  Volume mensuel de recherche. Aide l'humain a prioriser,
#                                 ignore par l'agent. Laisser null si inconnu.
#   kd              (informatif)  Keyword Difficulty 0-100. Aide l'humain a doser l'ambition,
#                                 ignore par l'agent. Laisser null si inconnu.
#   scheduled_date  (obligatoire) Date a partir de laquelle l'agent peut publier.
#                                 Format : YYYY-MM-DD.
#   status          todo | done | failed. Passer un failed en todo apres correction
#                                 manuelle pour relancer.
#
# CHAMPS REMPLIS PAR L'AGENT (ne pas toucher sauf pour debloquer un failed)
# -----------------------------------------------------------------------
#   published_date    YYYY-MM-DD reel de publication
#   published_url_fr  URL complete de la version FR
#   published_url_en  URL complete de la version EN
#   error             message d'erreur si status: failed
#
# AJOUT D'UNE NOUVELLE ENTREE
# ---------------------------
# Copier le bloc "exemple" ci-dessous, remplir kw, category, scheduled_date,
# laisser les autres champs tels quels.
#
# BONNES PRATIQUES
# ----------------
# - Espacer les scheduled_date selon la frequence de publication du blog
#   (ex: 2x/semaine = mardi et vendredi).
# - Eviter 2 KW cannibalisants dans des dates rapprochees.
# - Verifier que la category existe bien dans hugo.toml avant d'ajouter.
# - Eviter les KW trop concurrentiels pour un blog qui demarre (preferer la
#   longue traine).

articles:
  # ----- exemple (a supprimer ou remplacer) -----
  - kw: "exemple de mot cle"
    category: "Exemple de categorie"
    volume: 1200
    kd: 35
    scheduled_date: "2026-04-28"
    status: todo
    published_date: null
    published_url_fr: null
    published_url_en: null
    error: null
